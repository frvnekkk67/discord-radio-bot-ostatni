server:
  port: 2333
  address: 0.0.0.0


lavalink:
  server:
    password: "youshallnotpass"

    sources:
      youtube: false
      soundcloud: true
      http: true
      bandcamp: true
      twitch: true
      vimeo: true
      local: false

    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    trackStuckThresholdMs: 10000


  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"

    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.4.1"
      repository: "https://maven.lavalink.dev/releases"



plugins:
  youtube:
    enabled: true

    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

    clients:
      - WEB
      - MUSIC
      - ANDROID
      - TVHTML5EMBEDDED


  lavasrc:
    providers:
      spotify: true
      applemusic: false
      deezer: false
      youtube: true
      soundcloud: true


metrics:
  prometheus:
    enabled: false


logging:
  level:
    root: INFO
    lavalink: INFO
