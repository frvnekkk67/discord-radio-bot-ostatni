lavalink:
  server:
    password: "youshallnotpass"

    sources:
      youtube: false
      soundcloud: true
      http: true
      bandcamp: true
      twitch: true
      vimeo: true
      local: false

  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"

    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.4.1"
      repository: "https://maven.lavalink.dev/releases"


plugins:
  youtube:
    enabled: true

    clients:
      - WEB
      - ANDROID
      - MUSIC
      - TVHTML5EMBEDDED

    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true


  lavasrc:
    providers:
      spotify: true
      applemusic: false
      deezer: false
      youtube: true
      soundcloud: true
