server:
  port: 2333
  address: 0.0.0.0

lavalink:
  server:
    password: "youshallnotpass"

    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false

    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    trackStuckThresholdMs: 10000

  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"

    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.4.1"
      repository: "https://maven.lavalink.dev/releases"


plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

    clients:
      - MUSIC
      - ANDROID
      - IOS
      - TV


lavasrc:
  sources:
    spotify: false
    applemusic: true
    deezer: false
    youtube: true
    soundcloud: true

#  spotify:
#    clientId: "WSTAW_TUTAJ_SPOTIFY_CLIENT_ID"
#    clientSecret: "WSTAW_TUTAJ_SPOTIFY_CLIENT_SECRET"


metrics:
  prometheus:
    enabled: false


logging:
  level:
    root: INFO
    lavalink: INFO
